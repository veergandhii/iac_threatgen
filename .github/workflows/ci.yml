name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (locked deps + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install -e ".[dev]"

      - name: Lint (ruff incl. flake8-bandit security checks)
        run: ruff check src scripts tests

      - name: Test + coverage gate (>=90%)
        # No API key needed: the LLM is mocked in tests (CI-safe).
        run: pytest --cov=iac_threatgen --cov-report=term-missing --cov-fail-under=90
